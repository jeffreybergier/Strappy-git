services:
  altivec-intelligence:
    image: ghcr.io/jeffreybergier/altivec-intelligence:latest
    stdin_open: true
    tty: true
    environment:
      - IS_SANDBOX=1
    volumes:
      - ~/.strappy:/root
      - .:/repo/strappy-git
    working_dir: /repo/strappy-git
    entrypoint: /bin/bash
    command: -lc "altivec-chooser"

  shell:
    image: ghcr.io/jeffreybergier/altivec-intelligence:latest
    volumes:
      - ~/.strappy:/root
      - .:/repo/strappy-git
    working_dir: /repo/strappy-git

  # Runs the jobs dashboard and publishes it to every host interface (0.0.0.0),
  # so other machines on the LAN can browse http://<this-host-ip>:3000 — not just
  # http://localhost:3000 on the Mac. Builds once and runs the compiled dist/
  # snapshot (no tsx watch), so a live edit to src/*.ts cannot hot-reload into the
  # running server; picking up changes requires a deliberate rebuild/restart.
  serve:
    image: ghcr.io/jeffreybergier/altivec-intelligence:latest
    working_dir: /repo/strappy-git
    volumes:
      - ~/.strappy:/root
      - .:/repo/strappy-git
    ports:
      - "0.0.0.0:3000:3000"
    entrypoint: /bin/bash
    command: -lc "npm install --no-fund --no-audit && npm run build && npm start"

  # Runs the Node.js test suite once and exits with the test result code.
  # Run with: docker compose run --rm test
  test:
    image: ghcr.io/jeffreybergier/altivec-intelligence:latest
    working_dir: /repo/strappy-git
    volumes:
      - ~/.strappy:/root
      - .:/repo/strappy-git
    entrypoint: /bin/bash
    command: -lc "npm install --no-fund --no-audit && npm test"
